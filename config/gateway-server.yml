server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: event-service-request-api
          uri: lb://EVENT-SERVICE
          predicates:
            - Path=/users/*/events/*/requests
        - id: request-service-user-api
          uri: lb://REQUEST-SERVICE
          predicates:
            - Path=/users/*/requests/**
        - id: user-service-api
          uri: lb://USER-SERVICE
          predicates:
            - Path=/admin/users/**
        - id: event-service-api
          uri: lb://EVENT-SERVICE
          predicates:
            - Path=/admin/categories/**,/categories/**,/admin/compilations/**,/compilations/**,/admin/events/**,/users/*/events/**,/events/**
